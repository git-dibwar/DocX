<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monodraft — Sign in</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell auth-shell">
      <section class="panel glass">
        <p class="brand">MONODRAFT</p>
        <h1>Design-clean document refinement.</h1>
        <p class="muted">Upload DOCX or PDF, select edits, download instantly.</p>

        <div class="tabs">
          <button class="tab active" data-view="signin">Sign In</button>
          <button class="tab" data-view="signup">Create Account</button>
        </div>

        <form id="signin" class="form active">
          <input id="signinEmail" type="email" placeholder="Email" required />
          <input id="signinPassword" type="password" placeholder="Password" required />
          <button type="submit">Continue</button>
        </form>

        <form id="signup" class="form">
          <input id="signupEmail" type="email" placeholder="Email" required />
          <input id="signupPassword" type="password" placeholder="Password (8+ chars)" required />
          <button type="submit">Create account</button>
        </form>

        <p id="authMessage" class="muted"></p>
      </section>
    </main>
    <script src="login.js"></script>
  </body>
</html>
